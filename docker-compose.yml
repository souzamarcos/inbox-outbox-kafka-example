# Infra local do exemplo Inbox/Outbox.
#
# Padrão (sem profile): Kafka + Postgres + Kafka UI — suficiente para o publisher por POLLING.
#   docker compose up -d
#
# Alternativa CDC (Debezium): adiciona o Kafka Connect com o Debezium.
#   docker compose --profile cdc up -d
#
# Apps rodam no host e conectam em localhost:9092 (Kafka) e localhost:5432 (Postgres).

services:
  postgres:
    image: postgres:16
    container_name: iox-postgres
    # wal_level=logical é exigido pelo Debezium (CDC). Inofensivo para o modo polling.
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: iox-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft (sem Zookeeper), nó único atuando como broker + controller.
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      # Dois listeners: INTERNAL para containers (kafka:29092), EXTERNAL para o host (localhost:9092).
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: iox-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  # --- Alternativa CDC (só sobe com: docker compose --profile cdc up -d) ---
  connect:
    image: quay.io/debezium/connect:3.0
    container_name: iox-connect
    profiles: ["cdc"]
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: "debezium-connect"
      CONFIG_STORAGE_TOPIC: "_connect_configs"
      OFFSET_STORAGE_TOPIC: "_connect_offsets"
      STATUS_STORAGE_TOPIC: "_connect_status"
